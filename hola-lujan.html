<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Hola Luján</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.25rem 2rem;
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .logo { font-size: 11px; font-weight: 300; color: #666; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .title { font-size: 32px; font-weight: 600; color: #f0f0f0; margin-bottom: 0.3rem; }
  .subtitle { font-size: 14px; color: #888; font-weight: 300; }

  .api-section { width: 100%; max-width: 400px; margin-bottom: 2rem; }
  .api-label { font-size: 11px; color: #666; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .api-row { display: flex; gap: 8px; }
  .api-input {
    flex: 1; padding: 11px 14px;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    background: #1a1a1a;
    color: #f0f0f0;
    font-size: 13px;
    font-family: monospace;
    outline: none;
  }
  .api-input:focus { border-color: #444; }
  .save-btn {
    padding: 11px 18px;
    border: 1px solid #333;
    border-radius: 10px;
    background: #1e1e1e;
    color: #f0f0f0;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    white-space: nowrap;
  }
  .save-btn:active { background: #2a2a2a; }
  .api-status { font-size: 11px; margin-top: 5px; min-height: 16px; }
  .api-status.ok { color: #4caf50; }
  .api-status.err { color: #e57373; }

  .mic-area {
    display: flex; flex-direction: column; align-items: center; gap: 1.2rem; margin-bottom: 2rem;
  }
  .mic-btn {
    width: 110px; height: 110px; border-radius: 50%;
    border: 2px solid #2a2a2a;
    background: #1a1a1a;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn.listening { border-color: #D85A30; animation: pulse 1.4s ease-in-out infinite; }
  .mic-btn.loading { border-color: #378ADD; opacity: 0.7; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0px rgba(216,90,48,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(216,90,48,0); }
  }
  .mic-icon { width: 38px; height: 38px; color: #f0f0f0; }
  .status { font-size: 14px; color: #666; text-align: center; min-height: 20px; font-weight: 300; }
  .status.listening { color: #D85A30; }
  .status.loading { color: #378ADD; }

  .conversation {
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 10px;
    max-height: 300px; overflow-y: auto;
  }
  .bubble {
    padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.6; max-width: 88%;
  }
  .bubble.user {
    align-self: flex-end;
    background: #1a3a5c; color: #a8d0f0;
  }
  .bubble.lujan {
    align-self: flex-start;
    background: #1e1e1e; color: #e8e8e8;
    border: 1px solid #2a2a2a;
  }
  .bubble.error {
    align-self: center;
    background: #3a1a1a; color: #e57373;
    font-size: 13px; max-width: 95%;
  }
  .hint {
    margin-top: 2rem; font-size: 12px; color: #444;
    text-align: center; max-width: 300px; line-height: 1.7;
  }
  .hint strong { color: #666; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">asistente de voz</div>
  <div class="title">Hola, Luján</div>
  <div class="subtitle">Tocá el micrófono y hablá</div>
</div>

<div class="api-section">
  <div class="api-label">API Key de Anthropic</div>
  <div class="api-row">
    <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off"/>
    <button class="save-btn" onclick="saveKey()">Guardar</button>
  </div>
  <div class="api-status" id="apiStatus"></div>
</div>

<div class="mic-area">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">
    <svg class="mic-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="13" y="3" width="10" height="18" rx="5" fill="currentColor" opacity="0.9"/>
      <path d="M7 18c0 6.075 4.925 11 11 11s11-4.925 11-11" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <line x1="18" y1="29" x2="18" y2="33" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="13" y1="33" x2="23" y2="33" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="status" id="statusText">Listo para escucharte</div>
</div>

<div class="conversation" id="conversation"></div>

<div class="hint">
  <strong>Tip:</strong> En Chrome → menú (⋮) → "Agregar a pantalla de inicio" para instalarlo como app
</div>

<script>
  let apiKey = localStorage.getItem('lujan_key') || '';
  if (apiKey) {
    document.getElementById('apiKey').placeholder = '●●●●●●●●●●●● (guardada)';
    showStatus('Clave cargada', 'ok');
  }

  function showStatus(msg, type) {
    const el = document.getElementById('apiStatus');
    el.textContent = msg;
    el.className = 'api-status ' + type;
  }

  function saveKey() {
    const val = document.getElementById('apiKey').value.trim();
    if (!val.startsWith('sk-ant-')) {
      showStatus('La clave debe empezar con sk-ant-', 'err');
      return;
    }
    apiKey = val;
    localStorage.setItem('lujan_key', val);
    document.getElementById('apiKey').value = '';
    document.getElementById('apiKey').placeholder = '●●●●●●●●●●●● (guardada)';
    showStatus('Clave guardada correctamente', 'ok');
  }

  function setStatus(text, cls) {
    const el = document.getElementById('statusText');
    el.textContent = text;
    el.className = 'status ' + (cls || '');
  }

  function addBubble(text, type) {
    const conv = document.getElementById('conversation');
    const b = document.createElement('div');
    b.className = 'bubble ' + type;
    b.textContent = text;
    conv.appendChild(b);
    conv.scrollTop = conv.scrollHeight;
  }

  function speak(text) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'es-AR';
    utt.rate = 1.0;
    utt.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const esVoice = voices.find(v => v.lang.startsWith('es')) || null;
    if (esVoice) utt.voice = esVoice;
    window.speechSynthesis.speak(utt);
  }

  async function askLujan(userText) {
    if (!apiKey) {
      addBubble('Primero guardá tu API Key arriba.', 'error');
      return;
    }
    setStatus('Pensando...', 'loading');
    document.getElementById('micBtn').className = 'mic-btn loading';
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 1000,
          system: 'Sos Luján, un asistente de voz en español argentino. Respondé de forma clara, concisa y natural. Evitá usar markdown, asteriscos o listas con guiones — hablá como si fueras una persona conversando.',
          messages: [{ role: 'user', content: userText }]
        })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      const answer = data.content[0].text;
      addBubble(answer, 'lujan');
      speak(answer);
      setStatus('Listo para escucharte', '');
    } catch (e) {
      addBubble('Error: ' + e.message, 'error');
      setStatus('Hubo un error', '');
    }
    document.getElementById('micBtn').className = 'mic-btn';
  }

  let recognition = null;
  let isListening = false;

  function toggleMic() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      addBubble('Reconocimiento de voz no disponible. Usá Chrome en Android.', 'error');
      return;
    }
    if (isListening) { recognition && recognition.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'es-AR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => {
      isListening = true;
      document.getElementById('micBtn').className = 'mic-btn listening';
      setStatus('Escuchando...', 'listening');
    };
    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      addBubble(text, 'user');
      askLujan(text);
    };
    recognition.onerror = () => {
      setStatus('No se pudo escuchar, intentá de nuevo', '');
      document.getElementById('micBtn').className = 'mic-btn';
      isListening = false;
    };
    recognition.onend = () => {
      isListening = false;
      if (document.getElementById('micBtn').className === 'mic-btn listening') {
        document.getElementById('micBtn').className = 'mic-btn';
        setStatus('Listo para escucharte', '');
      }
    };
    recognition.start();
  }
</script>
</body>
</html>
